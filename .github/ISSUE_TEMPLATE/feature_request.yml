name: 功能建议
description: 提出一项具体、可落地的改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 现在哪里别扭
      description: 写具体使用问题，比如写不好、审不清、验不动，而不是空泛愿望。
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: 希望变成什么样
      description: 描述用户能看到的结果，不必先指定实现方案。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 想过的其他办法
  - type: dropdown
    id: scope
    attributes:
      label: 主要影响哪一块
      options:
        - Skill 写法与方法论
        - 触发评估
        - 契约评估
        - 证据校验
        - Skill 库审计
        - 文档或示例
        - CI / 发布工具
        - 其他
    validations:
      required: true
  - type: checkboxes
    id: evidence
    attributes:
      label: 关于证据
      options:
        - label: 我理解：行为或效果相关主张，需要对应的 fixture 或可复查对比
          required: true
